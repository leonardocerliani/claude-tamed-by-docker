# NOTE:
# This container dynamically creates a user at startup (entrypoint.sh).
# Therefore the root filesystem must be writable.
# Do NOT enable read_only: true — it will break user creation.

services:
  claude_sbl:
    image: claude_sbl
    stdin_open: true
    tty: true

    # Environment passed to entrypoint.sh
    environment:
      HOME: /workspace
      USER_ID: ${UID}
      GROUP_ID: ${GID}
      TERM: xterm-256color

    # Security: drop everything, re-add only what's needed for gosu
    security_opt:
      - no-new-privileges:true

    # ⚠️ Do NOT enable — breaks entrypoint user creation (see top of file)
    # read_only: true

    # Temporary writable space (Claude needs /tmp)
    tmpfs:
      - /tmp


    volumes:
      # Claude state (history, settings, etc.)
      - ./claude_state:/workspace/.claude

      # User scripts (read/write)
      - ./scripts:/workspace/scripts:rw

      # Data (read-only)
      - /path/to/your/data/directory/:/workspace/data:ro