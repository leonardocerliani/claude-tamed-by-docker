services:
  claude_sbl:
    image: claude_sbl
    stdin_open: true
    tty: true

    # Environment passed to entrypoint.sh
    environment:
      HOME: /workspace
      USER_ID: ${UID}
      GROUP_ID: ${GID}
      TERM: xterm-256color

    # Security: drop everything, re-add only what's needed for gosu
    security_opt:
      - no-new-privileges:true

    # Temporary writable space (Claude needs /tmp)
    tmpfs:
      - /tmp

    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID


    volumes:
      # Claude state (history, settings, etc.)
      - ./claude_state:/workspace/.claude

      # User scripts (read/write)
      - ./scripts:/workspace/scripts:rw

      # Data (read-only)
      - /data03/MRI_hackaton_data/Data_collection/bids/:/workspace/data:ro